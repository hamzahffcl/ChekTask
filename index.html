<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dragon's Ledger</title>
  
  <!-- Memuat React, Tailwind, dan Font -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Pirata+One&display=swap" rel="stylesheet">
  
  <style>
    body { background-color: #000; margin: 0; padding: 0; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 150, 0, 0.5); border-radius: 4px; }
  </style>
</head>
<body class="bg-black text-white">
  <!-- Wadah Utama Aplikasi -->
  <div id="root"></div>

  <!-- Kode Aplikasi Utama -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [tasks, setTasks] = useState([
        { id: 1, text: 'Kalahkan Naga Merah di Gunung Api', completed: false },
        { id: 2, text: 'Tempa Pedang Excalibur di Pandai Besi', completed: true },
        { id: 3, text: 'Kumpulkan 5 Ramuan Mana', completed: false },
        { id: 4, text: 'Selidiki desa yang diserang goblin', completed: false },
        { id: 5, text: 'Temui penyihir tua di Hutan Kelam', completed: false },
      ]);
      
      const [newTask, setNewTask] = useState('');
      const [filter, setFilter] = useState('all');

      // Efek glow random
      useEffect(() => {
        const interval = setInterval(() => {
          const glow = document.querySelector('.dragon-glow');
          if (glow) {
            const intensity = Math.random() * 0.4 + 0.35;
            glow.style.boxShadow = `0 0 ${70 + Math.random() * 50}px rgba(249, 115, 22, ${intensity})`;
          }
        }, 1800);
        return () => clearInterval(interval);
      }, []);

      const addTask = (e) => {
        e.preventDefault();
        if (!newTask.trim()) return;
        setTasks([...tasks, { id: Date.now(), text: newTask, completed: false }]);
        setNewTask('');
      };

      const toggleTask = (id) => {
        setTasks(tasks.map(task => 
          task.id === id ? { ...task, completed: !task.completed } : task
        ));
      };

      const deleteTask = (id) => {
        setTasks(tasks.filter(task => task.id !== id));
      };

      const pendingTasksCount = tasks.filter(t => !t.completed).length;

      const filteredTasks = tasks.filter(task => {
        if (filter === 'active') return !task.completed;
        if (filter === 'completed') return task.completed;
        return true;
      });

      return (
        <div className="flex justify-center min-h-screen font-[Cinzel] bg-black">
          <div className="w-full max-w-md min-h-screen flex flex-col relative overflow-hidden shadow-2xl dragon-glow" 
               style={{
                 backgroundImage: "linear-gradient(to bottom, rgba(20, 10, 25, 0.65), rgba(8, 3, 18, 0.95)), url('https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=1000&auto=format&fit=crop')",
                 backgroundSize: 'cover',
                 backgroundPosition: 'center',
                 height: '100dvh'
               }}>

            {/* Rune Dekorasi */}
            <div className="absolute top-12 left-8 text-amber-900/40 text-4xl opacity-50 pointer-events-none">ᚱ</div>
            <div className="absolute top-32 right-10 rotate-12 text-amber-900/40 text-4xl opacity-50 pointer-events-none">ᚨ</div>
            <div className="absolute bottom-52 left-6 rotate-6 text-amber-900/40 text-4xl opacity-50 pointer-events-none">ᛉ</div>

            {/* Bagian Header */}
            <header className="p-6 z-10 flex flex-col items-center justify-center relative mt-2 shrink-0">
              <div className="absolute inset-0 flex justify-center items-center opacity-30 pointer-events-none">
                <div className="w-44 h-44 bg-gradient-to-br from-orange-500 to-red-600 rounded-full blur-[70px]"></div>
              </div>
              
              <div className="flex items-center gap-4 relative">
                <span className="text-4xl animate-bounce">🐉</span>
                <h1 className="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-b from-amber-100 via-yellow-300 to-orange-500 font-['Pirata_One'] tracking-[3px]">
                  DRAGON'S LEDGER
                </h1>
                <span className="text-4xl animate-bounce">🔥</span>
              </div>
              
              <div className="mt-5 bg-black/70 border border-amber-600/70 rounded-3xl px-6 py-2 backdrop-blur-md flex items-center gap-3">
                <span className="text-2xl">📜</span>
                <span className="text-sm uppercase tracking-widest font-bold text-amber-200">
                  {pendingTasksCount} MISI TERTUNDA
                </span>
              </div>
            </header>

            {/* Area Daftar Misi (Scrollable) */}
            <main className="flex-1 overflow-y-auto p-5 space-y-4 pb-48 z-10 custom-scrollbar relative">
              {filteredTasks.length === 0 ? (
                <div className="h-full flex flex-col items-center justify-center mt-10">
                  <span className="text-5xl text-amber-500/30 mb-4">✨</span>
                  <p className="text-center text-amber-500/50">Tidak ada misi di kategori ini.</p>
                </div>
              ) : (
                filteredTasks.map(task => (
                  <div key={task.id} className="relative flex items-center justify-between p-5 rounded-2xl border-l-8 transition-all" 
                       style={{ 
                         backgroundColor: task.completed ? '#3c2f25' : '#f4e4c9',
                         borderColor: task.completed ? '#166534' : '#b91c1c'
                       }}>
                    
                    <button onClick={() => toggleTask(task.id)} className="flex items-center flex-1 text-left">
                      <div className="mr-5 shrink-0">
                        {task.completed ? (
                          <div className="w-8 h-8 rounded-full border-2 border-emerald-600 bg-emerald-900/40 flex items-center justify-center">
                            <span className="text-emerald-400 text-2xl font-bold">✓</span>
                          </div>
                        ) : (
                          <div className="w-8 h-8 rounded-full border-2 border-red-700 bg-red-950/40 flex items-center justify-center">
                            <span className="text-orange-400 text-xl">⚔</span>
                          </div>
                        )}
                      </div>
                      <span className={`text-[16px] leading-tight font-bold ${task.completed ? 'line-through text-gray-500' : 'text-gray-900'}`}>
                        {task.text}
                      </span>
                    </button>
                    
                    <button 
                      onClick={() => deleteTask(task.id)} 
                      className="text-red-700 hover:text-red-900 text-3xl p-2 shrink-0 hover:scale-125 transition-all active:scale-90"
                    >
                      ☠
                    </button>
                  </div>
                ))
              )}
            </main>

            {/* Filter Tombol Kategori */}
            <div className="absolute bottom-24 left-0 right-0 flex justify-center gap-2 z-20 px-5">
              {[
                { key: 'all', label: 'Semua' },
                { key: 'active', label: 'Aktif' },
                { key: 'completed', label: 'Selesai' }
              ].map(f => (
                <button
                  key={f.key}
                  onClick={() => setFilter(f.key)}
                  className={`px-5 py-2 text-xs font-bold rounded-2xl border transition-all ${filter === f.key 
                    ? 'bg-amber-700 border-amber-400 text-white' 
                    : 'bg-black/70 border-amber-800 text-amber-400'}`}
                >
                  {f.label}
                </button>
              ))}
            </div>

            {/* Area Input (Bawah) */}
            <div className="absolute bottom-0 w-full p-5 z-30 bg-gradient-to-t from-black via-black to-transparent pt-16">
              <form onSubmit={addTask} className="flex gap-3">
                <input 
                  type="text" 
                  value={newTask} 
                  onChange={(e) => setNewTask(e.target.value)} 
                  placeholder="Tuliskan misi baru..." 
                  className="flex-1 bg-zinc-950/90 border border-amber-600 focus:border-orange-500 text-amber-100 px-6 py-4 rounded-3xl outline-none placeholder-amber-400/50"
                />
                <button 
                  type="submit" 
                  disabled={!newTask.trim()} 
                  className="bg-gradient-to-br from-orange-600 to-red-700 px-7 rounded-3xl text-xl disabled:opacity-50 shrink-0"
                >
                  ⚔️
                </button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
