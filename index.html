<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <!-- Pengaturan viewport agar pas di layar HP dan tidak bisa di-zoom sembarangan -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dragon's Ledger</title>
  
  <!-- Memuat React, Tailwind, dan Font -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Pirata+One&display=swap" rel="stylesheet">
  
  <style>
    body { background-color: #000; margin: 0; padding: 0; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 150, 0, 0.5); border-radius: 4px; }
  </style>
</head>
<body class="bg-black">
  <div id="root"></div>

  <!-- Kode Aplikasi Utama -->
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [tasks, setTasks] = useState([
        { id: 1, text: 'Kalahkan Naga Merah di Gunung Api', completed: false },
        { id: 2, text: 'Tempa Pedang Excalibur di Pandai Besi', completed: true },
        { id: 3, text: 'Kumpulkan 5 Ramuan Mana', completed: false },
      ]);
      
      const [newTask, setNewTask] = useState('');

      const addTask = (e) => {
        e.preventDefault();
        if (!newTask.trim()) return;
        
        const newTaskObj = {
          id: Date.now(),
          text: newTask,
          completed: false
        };
        
        setTasks([...tasks, newTaskObj]);
        setNewTask(''); 
      };

      const toggleTask = (id) => {
        setTasks(tasks.map(task => 
          task.id === id ? { ...task, completed: !task.completed } : task
        ));
      };

      const deleteTask = (id) => {
        setTasks(tasks.filter(task => task.id !== id));
      };

      const pendingTasksCount = tasks.filter(t => !t.completed).length;

      return (
        <div 
          className="flex justify-center min-h-screen bg-black"
          style={{ fontFamily: "'Cinzel', serif" }}
        >
          {/* Container utama - Widget Mode */}
          <div 
            className="w-full max-w-md h-screen flex flex-col relative overflow-hidden shadow-[0_0_50px_rgba(255,100,0,0.3)]"
            style={{
              backgroundImage: `linear-gradient(to bottom, rgba(15, 10, 20, 0.4), rgba(10, 5, 15, 0.9)), url('https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=1000&auto=format&fit=crop')`,
              backgroundSize: 'cover',
              backgroundPosition: 'center',
              height: '100dvh'
            }}
          >
            
            {/* Header - Ornamen Sihir & Naga */}
            <header className="p-5 z-10 flex flex-col items-center justify-center relative mt-4">
              <div className="absolute inset-0 flex justify-center items-center opacity-30">
                 <div className="w-32 h-32 bg-orange-600 rounded-full blur-[40px] animate-pulse"></div>
              </div>
              
              <div className="flex items-center gap-3 relative">
                <span className="text-orange-500 animate-bounce text-2xl">🔥</span>
                <h1 
                  className="text-4xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 via-yellow-500 to-orange-700" 
                  style={{ fontFamily: "'Pirata One', cursive", textShadow: '0px 4px 10px rgba(0,0,0,0.8)' }}
                >
                  Dragon's Ledger
                </h1>
                <span className="text-orange-500 animate-bounce text-2xl">🔥</span>
              </div>
              
              <div className="mt-3 bg-black/60 border border-yellow-700/50 rounded-full px-4 py-1 backdrop-blur-sm flex items-center gap-2">
                <span className="text-yellow-500 text-sm">📜</span>
                <span className="text-xs text-yellow-200 tracking-wider font-bold">
                  {pendingTasksCount} Misi Tertunda
                </span>
              </div>
            </header>

            {/* Area Daftar Quest - Kertas Perkamen */}
            <main className="flex-1 overflow-y-auto p-4 space-y-4 pb-32 z-10 custom-scrollbar">
              {tasks.length === 0 ? (
                <div className="h-full flex flex-col items-center justify-center text-yellow-600/50 mt-10">
                  <span className="text-6xl mb-4 text-yellow-500/40">✨</span>
                  <p className="text-xl text-center" style={{ fontFamily: "'Pirata One', cursive" }}>
                    Kerajaan Damai.<br/>Tidak Ada Misi Tersedia.
                  </p>
                </div>
              ) : (
                tasks.map(task => (
                  <div
                    key={task.id}
                    className={`relative flex items-center justify-between p-4 rounded-sm transition-all duration-300 ${
                      task.completed 
                        ? 'opacity-60 scale-95' 
                        : 'scale-100 hover:scale-[1.02]'
                    }`}
                    style={{
                      backgroundColor: task.completed ? '#8c7e6c' : '#e6d5b8',
                      backgroundImage: `url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.15' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E")`,
                      boxShadow: task.completed 
                        ? 'inset 0 0 20px rgba(0,0,0,0.5)' 
                        : '0 10px 15px -3px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(139, 69, 19, 0.2)',
                      border: task.completed ? '1px solid #5c4e3c' : '1px solid #b89f78',
                      borderLeft: task.completed ? '4px solid #4a3f31' : '4px solid #8b0000'
                    }}
                  >
                    <button
                      onClick={() => toggleTask(task.id)}
                      className="flex items-center flex-1 text-left focus:outline-none group"
                    >
                      <div className="mr-4 flex-shrink-0 relative">
                        {task.completed ? (
                           <div className="w-6 h-6 rounded-full border-2 border-green-800 bg-green-900/30 flex items-center justify-center">
                             <div className="w-3 h-3 rounded-full bg-green-600 shadow-[0_0_10px_#22c55e]"></div>
                           </div>
                        ) : (
                           <div className="w-6 h-6 rounded-full border-2 border-red-800 bg-red-900/10 group-hover:bg-red-900/30 transition-colors flex items-center justify-center">
                              <span className="text-[10px]">🎯</span>
                           </div>
                        )}
                      </div>
                      <span 
                        className={`text-lg font-bold leading-tight ${
                          task.completed ? 'text-gray-700 line-through' : 'text-gray-900'
                        }`}
                      >
                        {task.text}
                      </span>
                    </button>
                    
                    <button
                      onClick={() => deleteTask(task.id)}
                      className="p-2 ml-2 flex-shrink-0 text-red-900/40 hover:text-red-700 transition-colors bg-red-900/5 hover:bg-red-900/10 rounded-full"
                      aria-label="Batalkan Misi"
                    >
                      <span className="text-xl">💀</span>
                    </button>
                  </div>
                ))
              )}
            </main>

            {/* Area Input - Buku Mantra */}
            <div className="absolute bottom-0 w-full p-4 z-20 pb-8 bg-gradient-to-t from-black via-black to-transparent">
              <form onSubmit={addTask} className="flex items-center gap-2 relative">
                 <div className="absolute inset-0 bg-blue-900/20 blur-xl rounded-full"></div>
                 
                <input
                  type="text"
                  value={newTask}
                  onChange={(e) => setNewTask(e.target.value)}
                  placeholder="Tuliskan dekrit misi baru..."
                  className="flex-1 bg-black/50 border border-blue-500/50 focus:border-blue-400 text-blue-100 px-5 py-4 rounded-full outline-none text-sm font-bold shadow-[inset_0_0_15px_rgba(59,130,246,0.2)] placeholder-blue-300/30 relative z-10 backdrop-blur-md"
                />
                <button
                  type="submit"
                  disabled={!newTask.trim()}
                  className="relative z-10 bg-gradient-to-r from-blue-700 to-indigo-900 border border-blue-400/50 text-blue-200 px-4 py-3 rounded-full hover:from-blue-600 hover:to-indigo-800 disabled:opacity-50 disabled:grayscale transition-all shadow-[0_0_15px_rgba(59,130,246,0.5)] active:scale-95 text-xl"
                >
                  <span className={newTask.trim() ? "animate-pulse" : ""}>⚔️</span>
                </button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
